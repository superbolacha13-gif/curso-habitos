<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Comprar Curso</title>
<style>
body{
font-family:Arial;
background:#f4f6fb;
text-align:center;
padding:50px;
}
.box{
background:white;
padding:40px;
border-radius:15px;
width:300px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
button{
background:#5b7cff;
color:white;
border:none;
padding:15px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>Curso Mente Organizada</h1>

<h2>R$29,90 / mês</h2>

<p>Pagamento seguro</p>

<button onclick="alert('Pagamento simulado')">
Pagar agora
</button>

</div>

</body>
</html>
